<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Álbum Mundial 2026 — La Organización. Colección de cromos de jugadores de Roblox organizados por país.">
    <title>Álbum Mundial 2026 — La Organización</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Header -->
    <header id="album-header">
        <div class="header-content">
            <div class="header-brand">
                <span class="brand-icon">🏆</span>
                <div class="brand-text">
                    <h1>ÁLBUM MUNDIAL 2026</h1>
                    <p class="brand-subtitle">LA ORGANIZACIÓN</p>
                </div>
            </div>
            <div class="header-controls">
                <div class="search-box" id="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="search-input" placeholder="Buscar jugador..." autocomplete="off">
                    <div class="search-results" id="search-results"></div>
                </div>
                <div class="filter-dropdown" id="country-filter">
                    <button class="filter-btn" id="filter-btn">
                        <span id="filter-label">Todos los países</span>
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </button>
                    <div class="filter-menu" id="filter-menu"></div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Album -->
    <main id="album-main">
        <button class="nav-btn nav-prev" id="btn-prev" aria-label="Página anterior">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
        </button>

        <div class="album-book" id="album-book">
            <div class="page page-left" id="page-left">
                <div class="page-inner">
                    <div class="page-grid" id="grid-left"></div>
                </div>
            </div>
            <div class="book-spine"></div>
            <div class="page page-right" id="page-right">
                <div class="page-inner">
                    <div class="page-grid" id="grid-right"></div>
                </div>
            </div>
        </div>

        <button class="nav-btn nav-next" id="btn-next" aria-label="Página siguiente">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="9 18 15 12 9 6"/>
            </svg>
        </button>
    </main>

    <!-- Footer -->
    <footer id="album-footer">
        <div class="footer-content">
            <span id="page-indicator">Página 1 / 1</span>
            <span class="footer-dot">•</span>
            <span id="player-count">0 jugadores</span>
            <span class="footer-dot">•</span>
            <span id="country-count">0 países</span>
        </div>
    </footer>

    <!-- Modal Popup -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-card-container" id="modal-card">
            <button class="modal-close" id="modal-close" aria-label="Cerrar">✕</button>
        </div>
    </div>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="loading-spinner"></div>
        <p class="loading-text">Cargando álbum...</p>
    </div>

    <script src="data/jugadores.js?v=1781816300"></script>
    <script src="app.js?v=1781816300"></script>
</body>
</html>
